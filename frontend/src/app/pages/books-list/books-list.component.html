<section class="stack">
  <div class="card">
    <h1>Books</h1>
    <p class="muted">All books from the backend.</p>
  </div>

  <div *ngIf="loading" class="card">Loading books...</div>
  <div *ngIf="error" class="card error">{{ error }}</div>

  <div class="grid grid-3" *ngIf="!loading && !error">
    <article class="card stack" *ngFor="let book of books">
      <div>
        <h3>{{ book.title }}</h3>
        <p class="muted">{{ book.category?.name || 'No category' }}</p>
      </div>
      <p>{{ book.description || 'No description.' }}</p>
      <p class="muted">Rating: {{ book.average_rating || 0 }} · Reviews: {{ book.reviews_count || 0 }}</p>
      <div>
        <a class="btn" [routerLink]="['/books', book.id]">Open details</a>
      </div>
    </article>
  </div>
</section>
