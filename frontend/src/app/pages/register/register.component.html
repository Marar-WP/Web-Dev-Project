<section class="auth-shell">
  <div class="card auth-card stack">
    <span class="eyebrow">Create account</span>
    <h1>Register</h1>
    <p class="muted">Create a reader profile to leave reviews and manage your account.</p>

    <div>
      <label class="label">Username</label>
      <input class="input" [(ngModel)]="username" placeholder="Choose username">
    </div>
    <div>
      <label class="label">Email</label>
      <input class="input" [(ngModel)]="email" placeholder="name@example.com">
    </div>
    <div>
      <label class="label">Password</label>
      <input class="input" type="password" [(ngModel)]="password" placeholder="Create password">
    </div>
    <div>
      <label class="label">Repeat password</label>
      <input class="input" type="password" [(ngModel)]="password2" placeholder="Repeat password">
    </div>
    <div>
      <button class="btn" type="button" (click)="submit()">Register</button>
    </div>
    <div *ngIf="message" class="alert alert-error">{{ message }}</div>
  </div>
</section>
