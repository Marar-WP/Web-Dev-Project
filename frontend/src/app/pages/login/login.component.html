<section class="auth-shell">
  <div class="card auth-card stack">
    <span class="eyebrow">Account access</span>
    <h1>Login</h1>
    <p class="muted">Use your account to write reviews and manage your profile.</p>

    <div>
      <label class="label">Username</label>
      <input class="input" [(ngModel)]="username" placeholder="Enter username">
    </div>
    <div>
      <label class="label">Password</label>
      <input class="input" type="password" [(ngModel)]="password" placeholder="Enter password">
    </div>
    <div>
      <button class="btn" type="button" (click)="submit()">Login</button>
    </div>
    <div *ngIf="message" class="alert alert-error">{{ message }}</div>
  </div>
</section>
